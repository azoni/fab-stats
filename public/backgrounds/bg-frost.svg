<svg xmlns="http://www.w3.org/2000/svg" width="440" height="600" viewBox="0 0 440 600">
  <defs>
    <radialGradient id="fGlow" cx="50%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#0c1520"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <pattern id="hexgrid" x="0" y="0" width="50" height="43.3" patternUnits="userSpaceOnUse">
      <path d="M25 0L50 14.4V28.9L25 43.3L0 28.9V14.4Z" fill="none" stroke="rgba(56,189,248,0.05)" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="fShimmer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(56,189,248,0)"/>
      <stop offset="50%" stop-color="rgba(56,189,248,0.03)"/>
      <stop offset="100%" stop-color="rgba(56,189,248,0)"/>
    </linearGradient>
  </defs>
  <rect width="440" height="600" fill="url(#fGlow)"/>
  <rect width="440" height="600" fill="url(#hexgrid)"/>
  <rect width="440" height="600" fill="url(#fShimmer)"/>
  <!-- Snowflake / ice crystal patterns -->
  <g opacity="0.06" stroke="#38bdf8" fill="none" stroke-width="0.5">
    <!-- Crystal 1 -->
    <g transform="translate(80,120)">
      <line x1="0" y1="-20" x2="0" y2="20"/>
      <line x1="-17" y1="-10" x2="17" y2="10"/>
      <line x1="-17" y1="10" x2="17" y2="-10"/>
      <line x1="0" y1="-14" x2="-5" y2="-18"/>
      <line x1="0" y1="-14" x2="5" y2="-18"/>
      <line x1="0" y1="14" x2="-5" y2="18"/>
      <line x1="0" y1="14" x2="5" y2="18"/>
    </g>
    <!-- Crystal 2 -->
    <g transform="translate(360,200)">
      <line x1="0" y1="-16" x2="0" y2="16"/>
      <line x1="-14" y1="-8" x2="14" y2="8"/>
      <line x1="-14" y1="8" x2="14" y2="-8"/>
      <line x1="0" y1="-11" x2="-4" y2="-14"/>
      <line x1="0" y1="-11" x2="4" y2="-14"/>
    </g>
    <!-- Crystal 3 -->
    <g transform="translate(150,450)">
      <line x1="0" y1="-22" x2="0" y2="22"/>
      <line x1="-19" y1="-11" x2="19" y2="11"/>
      <line x1="-19" y1="11" x2="19" y2="-11"/>
      <line x1="0" y1="-16" x2="-6" y2="-20"/>
      <line x1="0" y1="-16" x2="6" y2="-20"/>
      <line x1="0" y1="16" x2="-6" y2="20"/>
      <line x1="0" y1="16" x2="6" y2="20"/>
    </g>
    <!-- Crystal 4 -->
    <g transform="translate(380,500)">
      <line x1="0" y1="-14" x2="0" y2="14"/>
      <line x1="-12" y1="-7" x2="12" y2="7"/>
      <line x1="-12" y1="7" x2="12" y2="-7"/>
    </g>
  </g>
  <!-- Frost particles -->
  <g opacity="0.12">
    <circle cx="70" cy="80" r="0.8" fill="#38bdf8"/>
    <circle cx="250" cy="50" r="0.5" fill="#38bdf8"/>
    <circle cx="400" cy="150" r="0.7" fill="#38bdf8"/>
    <circle cx="30" cy="300" r="0.6" fill="#38bdf8"/>
    <circle cx="180" cy="350" r="0.9" fill="#38bdf8"/>
    <circle cx="320" cy="400" r="0.5" fill="#38bdf8"/>
    <circle cx="90" cy="530" r="0.7" fill="#38bdf8"/>
    <circle cx="410" cy="560" r="0.6" fill="#38bdf8"/>
    <circle cx="220" cy="180" r="0.4" fill="#38bdf8"/>
    <circle cx="350" cy="320" r="0.8" fill="#38bdf8"/>
  </g>
  <!-- Ice shard accents on edges -->
  <g opacity="0.05" fill="#38bdf8">
    <polygon points="0,100 8,120 0,140"/>
    <polygon points="440,200 432,220 440,240"/>
    <polygon points="0,400 6,415 0,430"/>
    <polygon points="440,480 434,495 440,510"/>
