<svg xmlns="http://www.w3.org/2000/svg" width="440" height="600" viewBox="0 0 440 600">
  <defs>
    <radialGradient id="cGlow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a0810"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </radialGradient>
    <pattern id="chainmail" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="10" fill="none" stroke="rgba(220,40,80,0.06)" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="10" fill="none" stroke="rgba(220,40,80,0.06)" stroke-width="0.5"/>
      <circle cx="24" cy="0" r="10" fill="none" stroke="rgba(220,40,80,0.06)" stroke-width="0.5"/>
      <circle cx="0" cy="24" r="10" fill="none" stroke="rgba(220,40,80,0.06)" stroke-width="0.5"/>
      <circle cx="24" cy="24" r="10" fill="none" stroke="rgba(220,40,80,0.06)" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="cVignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(220,40,80,0.08)"/>
      <stop offset="50%" stop-color="rgba(220,40,80,0)"/>
      <stop offset="100%" stop-color="rgba(220,40,80,0.08)"/>
    </linearGradient>
  </defs>
  <rect width="440" height="600" fill="url(#cGlow)"/>
  <rect width="440" height="600" fill="url(#chainmail)"/>
  <rect width="440" height="600" fill="url(#cVignette)"/>
  <!-- Blood drip accents at top -->
  <g opacity="0.08" fill="#dc2850">
    <ellipse cx="80" cy="0" rx="1.5" ry="40"/>
    <ellipse cx="160" cy="0" rx="1" ry="25"/>
    <ellipse cx="280" cy="0" rx="1.5" ry="35"/>
    <ellipse cx="360" cy="0" rx="1" ry="20"/>
  </g>
  <!-- Crossed swords center watermark -->
  <g transform="translate(220,300)" opacity="0.04" stroke="#dc2850" stroke-width="1.5" fill="none">
    <line x1="-60" y1="-80" x2="60" y2="80"/>
    <line x1="60" y1="-80" x2="-60" y2="80"/>
    <!-- Sword guards -->
    <line x1="-35" y1="-45" x2="-55" y2="-35"/>
    <line x1="-35" y1="-45" x2="-25" y2="-65"/>
    <line x1="35" y1="-45" x2="55" y2="-35"/>
    <line x1="35" y1="-45" x2="25" y2="-65"/>
    <!-- Pommel circles -->
    <circle cx="-68" cy="-90" r="4"/>
    <circle cx="68" cy="-90" r="4"/>
  </g>
  <!-- Scattered embers -->
  <g opacity="0.1">
    <circle cx="50" cy="120" r="1" fill="#dc2850"/>
    <circle cx="390" cy="180" r="0.8" fill="#dc2850"/>
    <circle cx="100" cy="400" r="1.2" fill="#dc2850"/>
    <circle cx="340" cy="450" r="0.7" fill="#dc2850"/>
    <circle cx="200" cy="550" r="1" fill="#dc2850"/>
    <circle cx="410" cy="80" r="0.6" fill="#dc2850"/>
    <circle cx="30" cy="500" r="0.9" fill="#dc2850"/>
  </g>
  <!-- Border trim -->
  <rect x="4" y="4" width="432" height="592" rx="8" fill="none" stroke="rgba(220,40,80,0.06)" stroke-width="0.5"/>
</svg>