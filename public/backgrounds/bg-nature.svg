<svg xmlns="http://www.w3.org/2000/svg" width="440" height="600" viewBox="0 0 440 600">
  <defs>
    <radialGradient id="nBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#081210"/>
      <stop offset="100%" stop-color="#040a08"/>
    </radialGradient>
    <radialGradient id="nGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(16,185,129,0.06)"/>
      <stop offset="100%" stop-color="rgba(16,185,129,0)"/>
    </radialGradient>
  </defs>
  <rect width="440" height="600" fill="url(#nBg)"/>
  <rect width="440" height="600" fill="url(#nGlow)"/>

  <!-- Large tree of life / world tree -->
  <g transform="translate(220,320)" opacity="0.12" stroke="#10b981" fill="none">
    <!-- Trunk -->
    <path d="M-12 180 Q-15 140 -10 100 Q-8 60 -5 20 Q-3 -10 0 -30" stroke-width="5" stroke-linecap="round"/>
    <path d="M12 180 Q15 140 10 100 Q8 60 5 20 Q3 -10 0 -30" stroke-width="5" stroke-linecap="round"/>
    <!-- Trunk texture -->
    <path d="M-5 160 Q0 155 5 160" stroke-width="0.8"/>
    <path d="M-7 130 Q0 125 7 130" stroke-width="0.8"/>
    <path d="M-6 100 Q0 95 6 100" stroke-width="0.8"/>
    <path d="M-4 70 Q0 66 4 70" stroke-width="0.8"/>

    <!-- Main branches -->
    <!-- Left branches -->
    <path d="M-6 40 Q-40 10 -80 -20 Q-100 -30 -110 -50" stroke-width="3" stroke-linecap="round"/>
    <path d="M-8 0 Q-50 -30 -90 -60 Q-110 -75 -120 -100" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-5 -20 Q-35 -55 -60 -90 Q-70 -105 -75 -130" stroke-width="2" stroke-linecap="round"/>
    <!-- Right branches -->
    <path d="M6 40 Q40 10 80 -20 Q100 -30 110 -50" stroke-width="3" stroke-linecap="round"/>
    <path d="M8 0 Q50 -30 90 -60 Q110 -75 120 -100" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M5 -20 Q35 -55 60 -90 Q70 -105 75 -130" stroke-width="2" stroke-linecap="round"/>
    <!-- Top branch -->
    <path d="M0 -30 Q0 -60 -10 -100 Q-15 -120 -20 -145" stroke-width="2" stroke-linecap="round"/>
    <path d="M0 -30 Q0 -60 10 -100 Q15 -120 20 -145" stroke-width="2" stroke-linecap="round"/>
    <path d="M0 -30 Q-2 -80 0 -155" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Sub-branches (twigs) -->
    <path d="M-80 -20 Q-90 -40 -95 -55" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M-60 -10 Q-70 -25 -80 -30" stroke-width="1" stroke-linecap="round"/>
    <path d="M80 -20 Q90 -40 95 -55" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M60 -10 Q70 -25 80 -30" stroke-width="1" stroke-linecap="round"/>
    <path d="M-90 -60 Q-105 -80 -115 -90" stroke-width="1" stroke-linecap="round"/>
    <path d="M90 -60 Q105 -80 115 -90" stroke-width="1" stroke-linecap="round"/>

    <!-- Roots spreading out at base -->
    <path d="M-12 180 Q-30 190 -60 195 Q-80 198 -100 195" stroke-width="3" stroke-linecap="round"/>
    <path d="M-12 180 Q-25 200 -45 210 Q-60 215 -80 212" stroke-width="2" stroke-linecap="round"/>
    <path d="M12 180 Q30 190 60 195 Q80 198 100 195" stroke-width="3" stroke-linecap="round"/>
    <path d="M12 180 Q25 200 45 210 Q60 215 80 212" stroke-width="2" stroke-linecap="round"/>
    <path d="M0 183 Q0 210 0 230" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Leaf clusters / canopy -->
  <g opacity="0.07" fill="#10b981">
    <!-- Top canopy -->
    <circle cx="200" cy="155" r="20"/>
    <circle cx="240" cy="155" r="20"/>
    <circle cx="220" cy="145" r="22"/>
    <circle cx="180" cy="170" r="16"/>
    <circle cx="260" cy="170" r="16"/>
    <circle cx="220" cy="165" r="18"/>
    <!-- Left canopy -->
    <circle cx="135" cy="210" r="18"/>
    <circle cx="115" cy="220" r="15"/>
    <circle cx="100" cy="245" r="14"/>
    <circle cx="155" cy="195" r="12"/>
    <!-- Right canopy -->
    <circle cx="305" cy="210" r="18"/>
    <circle cx="325" cy="220" r="15"/>
    <circle cx="340" cy="245" r="14"/>
    <circle cx="285" cy="195" r="12"/>
    <!-- Upper canopy -->
    <circle cx="195" cy="180" r="14"/>
    <circle cx="245" cy="180" r="14"/>
    <circle cx="165" cy="200" r="12"/>
    <circle cx="275" cy="200" r="12"/>
  </g>

  <!-- Floating leaves -->
  <g opacity="0.15" fill="#10b981">
    <g transform="translate(60,100) rotate(25)">
      <ellipse rx="6" ry="3"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#10b981" stroke-width="0.3"/>
    </g>
    <g transform="translate(370,140) rotate(-15)">
      <ellipse rx="5" ry="2.5"/>
      <line x1="-4" y1="0" x2="4" y2="0" stroke="#10b981" stroke-width="0.3"/>
    </g>
    <g transform="translate(80,450) rotate(40)">
      <ellipse rx="7" ry="3"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#10b981" stroke-width="0.3"/>
    </g>
    <g transform="translate(350,500) rotate(-30)">
      <ellipse rx="5" ry="2.5"/>
      <line x1="-4" y1="0" x2="4" y2="0" stroke="#10b981" stroke-width="0.3"/>
    </g>
    <g transform="translate(40,300) rotate(10)">
      <ellipse rx="4" ry="2"/>
    </g>
    <g transform="translate(400,340) rotate(-20)">
      <ellipse rx="5" ry="2"/>
    </g>
  </g>

  <!-- Firefly / nature spirit particles -->
  <g opacity="0.25">
    <circle cx="55" cy="180" r="1.5" fill="#34d399"/>
    <circle cx="385" cy="200" r="1.2" fill="#6ee7b7"/>
    <circle cx="70" cy="350" r="1.8" fill="#34d399"/>
    <circle cx="370" cy="380" r="1" fill="#6ee7b7"/>
    <circle cx="150" cy="480" r="1.3" fill="#a7f3d0"/>
    <circle cx="290" cy="500" r="1.5" fill="#34d399"/>
    <circle cx="45" cy="530" r="1" fill="#6ee7b7"/>
    <circle cx="395" cy="520" r="1.2" fill="#a7f3d0"/>
  </g>

  <!-- Vine tendrils along edges -->
  <g opacity="0.05" stroke="#10b981" fill="none" stroke-width="1.5" stroke-linecap="round">
    <path d="M5 80 Q15 100 10 120 Q5 140 15 160 Q25 175 15 195"/>
    <path d="M435 80 Q425 100 430 120 Q435 140 425 160 Q415 175 425 195"/>
    <path d="M5 420 Q15 440 10 460 Q5 480 15 500 Q25 515 15 535"/>
    <path d="M435 420 Q425 440 430 460 Q435 480 425 500 Q415 515 425 535"/>
  </g>
</svg>