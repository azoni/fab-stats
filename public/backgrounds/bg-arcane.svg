<svg xmlns="http://www.w3.org/2000/svg" width="440" height="600" viewBox="0 0 440 600">
  <defs>
    <radialGradient id="aBg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#12081e"/>
      <stop offset="100%" stop-color="#06030c"/>
    </radialGradient>
    <radialGradient id="aGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(139,92,246,0.15)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0)"/>
    </radialGradient>
  </defs>
  <rect width="440" height="600" fill="url(#aBg)"/>

  <!-- Central magic circle glow -->
  <ellipse cx="220" cy="300" rx="140" ry="140" fill="url(#aGlow)"/>

  <!-- Outer magic circle -->
  <g transform="translate(220,300)" opacity="0.14" stroke="#8b5cf6" fill="none">
    <circle r="130" stroke-width="1.5"/>
    <circle r="125" stroke-width="0.5" stroke-dasharray="4,6"/>
    <circle r="110" stroke-width="1"/>
    <circle r="105" stroke-width="0.5" stroke-dasharray="2,8"/>

    <!-- Inner circles -->
    <circle r="75" stroke-width="1.2"/>
    <circle r="45" stroke-width="0.8"/>
    <circle r="20" stroke-width="1" fill="rgba(139,92,246,0.08)"/>

    <!-- Cardinal lines extending to outer ring -->
    <line x1="0" y1="-130" x2="0" y2="-75" stroke-width="1"/>
    <line x1="0" y1="75" x2="0" y2="130" stroke-width="1"/>
    <line x1="-130" y1="0" x2="-75" y2="0" stroke-width="1"/>
    <line x1="75" y1="0" x2="130" y2="0" stroke-width="1"/>

    <!-- Diagonal lines -->
    <line x1="-92" y1="-92" x2="-53" y2="-53" stroke-width="0.8"/>
    <line x1="92" y1="-92" x2="53" y2="-53" stroke-width="0.8"/>
    <line x1="-92" y1="92" x2="-53" y2="53" stroke-width="0.8"/>
    <line x1="92" y1="92" x2="53" y2="53" stroke-width="0.8"/>

    <!-- Rune symbols around the circle -->
    <!-- Top rune: stylized eye -->
    <g transform="translate(0,-95)">
      <path d="M-10 0 Q0 -8 10 0 Q0 8 -10 0" stroke-width="1.2"/>
      <circle r="3" fill="rgba(139,92,246,0.3)"/>
    </g>
    <!-- Right rune: lightning bolt -->
    <g transform="translate(95,0)">
      <path d="M-3 -10 L2 -2 L-2 2 L3 10" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <!-- Bottom rune: diamond -->
    <g transform="translate(0,95)">
      <path d="M0 -10 L8 0 L0 10 L-8 0 Z" stroke-width="1"/>
    </g>
    <!-- Left rune: triple moon -->
    <g transform="translate(-95,0)">
      <path d="M0 -8 A8 8 0 0 1 0 8" stroke-width="1"/>
      <path d="M0 -8 A8 8 0 0 0 0 8" stroke-width="1"/>
      <circle r="2" fill="rgba(139,92,246,0.3)"/>
    </g>

    <!-- Star points between rune positions -->
    <g transform="translate(-67,-67) rotate(45)">
      <path d="M0 -6 L2 -2 L6 0 L2 2 L0 6 L-2 2 L-6 0 L-2 -2 Z" fill="rgba(139,92,246,0.2)" stroke-width="0.5"/>
    </g>
    <g transform="translate(67,-67) rotate(45)">
      <path d="M0 -6 L2 -2 L6 0 L2 2 L0 6 L-2 2 L-6 0 L-2 -2 Z" fill="rgba(139,92,246,0.2)" stroke-width="0.5"/>
    </g>
    <g transform="translate(-67,67) rotate(45)">
      <path d="M0 -6 L2 -2 L6 0 L2 2 L0 6 L-2 2 L-6 0 L-2 -2 Z" fill="rgba(139,92,246,0.2)" stroke-width="0.5"/>
    </g>
    <g transform="translate(67,67) rotate(45)">
      <path d="M0 -6 L2 -2 L6 0 L2 2 L0 6 L-2 2 L-6 0 L-2 -2 Z" fill="rgba(139,92,246,0.2)" stroke-width="0.5"/>
    </g>

    <!-- Pentagram inside inner circle -->
    <g opacity="0.7">
      <path d="M0 -45 L26.6 36.4 L-43 -14.6 L43 -14.6 L-26.6 36.4 Z" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Floating arcane particles -->
  <g opacity="0.25">
    <circle cx="60" cy="80" r="1.5" fill="#8b5cf6"/>
    <circle cx="380" cy="100" r="1" fill="#a78bfa"/>
    <circle cx="100" cy="480" r="1.2" fill="#8b5cf6"/>
    <circle cx="340" cy="520" r="1.5" fill="#a78bfa"/>
    <circle cx="50" cy="250" r="0.8" fill="#c4b5fd"/>
    <circle cx="390" cy="380" r="1" fill="#c4b5fd"/>
    <circle cx="150" cy="140" r="1.8" fill="#7c3aed"/>
    <circle cx="300" cy="500" r="1.3" fill="#7c3aed"/>
  </g>

  <!-- Floating spell books / scroll corners -->
  <g opacity="0.06" fill="#8b5cf6">
    <!-- Top-left scroll curl -->
    <g transform="translate(30,40)">
      <path d="M0 0 Q15 0 15 15 L15 40 Q15 45 10 45 L5 45 Q0 45 0 40 Z" stroke="#8b5cf6" stroke-width="0.5" fill="none"/>
      <path d="M0 0 Q5 5 0 10 Q-5 5 0 0" fill="rgba(139,92,246,0.15)"/>
    </g>
    <!-- Bottom-right scroll curl -->
    <g transform="translate(410,560) rotate(180)">
      <path d="M0 0 Q15 0 15 15 L15 40 Q15 45 10 45 L5 45 Q0 45 0 40 Z" stroke="#8b5cf6" stroke-width="0.5" fill="none"/>
      <path d="M0 0 Q5 5 0 10 Q-5 5 0 0" fill="rgba(139,92,246,0.15)"/>
    </g>
  </g>
</svg>