<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="5%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#d4a54a"/>
      <stop offset="95%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0e0c08"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#gold-line)"/>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#gold-line)"/>

  <!-- Logo icon -->
  <g transform="translate(270, 175)">
    <rect width="140" height="140" rx="28" fill="#1c1812" stroke="#3e3528" stroke-width="3"/>
    <g transform="translate(25, 25) scale(3.75)">
      <rect x="5" y="2" width="14" height="20" rx="2" stroke="#d4a54a" stroke-width="1.8" fill="none"/>
      <rect x="7.5" y="13" width="2" height="3" fill="#E53935"/>
      <rect x="11" y="10" width="2" height="6" fill="#FBC02D"/>
      <rect x="14.5" y="6" width="2" height="10" fill="#1E88E5"/>
    </g>
  </g>

  <!-- Title -->
  <text x="440" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="700" fill="#d4a54a" letter-spacing="-3">FaB Stats</text>

  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="400" fill="#9a8e7a">Flesh and Blood Match Tracker</text>

  <!-- Domain -->
  <text x="600" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#6b6050" letter-spacing="2">fabstats.net</text>
</svg>
