[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[functions]
  included_files = ["node_modules/@resvg/resvg-js-*/**", "netlify/functions/fonts/*"]

# Edge function rewrites OG meta tags with actual username
[[edge_functions]]
  path = "/player/*"
  function = "og-rewrite"

# Edge function rewrites OG meta tags for community meta page
[[edge_functions]]
  path = "/meta"
  function = "og-rewrite-meta"

# Proxy OG image function through clean URLs for crawler compatibility + CDN caching
[[redirects]]
  from = "/og/player/:username.png"
  to = "/.netlify/functions/og-image?username=:username"
  status = 200

[[redirects]]
  from = "/og/meta.png"
  to = "/.netlify/functions/og-image?type=meta"
  status = 200

# JSON-LD endpoint — exposes KG entities as schema.org structured data
[[redirects]]
  from = "/api/jsonld/:type/:id"
  to = "/.netlify/functions/jsonld?type=:type&id=:id"
  status = 200

# Semantic player search (vector + hybrid)
[[redirects]]
  from = "/api/kg-search"
  to = "/.netlify/functions/kg-search"
  status = 200

# KG visualizer graph data
[[redirects]]
  from = "/api/kg-graph"
  to = "/.netlify/functions/kg-graph"
  status = 200

# KG overview stats (lab console)
[[redirects]]
  from = "/api/kg-stats"
  to = "/.netlify/functions/kg-stats"
  status = 200

# Internal /lab console data (server-side, bypasses Firestore rules)
[[redirects]]
  from = "/api/lab-data"
  to = "/.netlify/functions/lab-data"
  status = 200

# Force redirect from netlify subdomain to custom domain
[[redirects]]
  from = "https://fabstats.netlify.app/*"
  to = "https://fabstats.net/:splat"
  status = 301
  force = true

# Serve pre-rendered player page for all /player/* URLs
# so the correct RSC payload and layout are used
[[redirects]]
  from = "/player/*"
  to = "/player/_.html"
  status = 200

# /community renamed to /activity — preserve old links/bookmarks.
[[redirects]]
  from = "/community"
  to = "/activity"
  status = 301

[[redirects]]
  from = "/community/*"
  to = "/activity/:splat"
  status = 301

# Articles UI was retired — redirect any inbound article URLs to home.
# (Firestore article data is preserved; only the public-facing UI is gone.)
[[redirects]]
  from = "/articles"
  to = "/"
  status = 301

[[redirects]]
  from = "/articles/*"
  to = "/"
  status = 301

# /team renamed to /teams — preserve old links/bookmarks.
[[redirects]]
  from = "/team"
  to = "/teams"
  status = 301

[[redirects]]
  from = "/team/*"
  to = "/teams/:splat"
  status = 301

# Serve team hub page at exact /teams path
[[redirects]]
  from = "/teams"
  to = "/teams.html"
  status = 200

# Serve pre-rendered team profile page for /teams/* URLs
[[redirects]]
  from = "/teams/*"
  to = "/teams/_.html"
  status = 200

# Serve group hub page at exact /group path
[[redirects]]
  from = "/group"
  to = "/group.html"
  status = 200

# Serve pre-rendered group profile page for /group/* URLs
[[redirects]]
  from = "/group/*"
  to = "/group/_.html"
  status = 200

# Serve leagues hub at exact /leagues path
[[redirects]]
  from = "/leagues"
  to = "/leagues.html"
  status = 200

# Serve pre-rendered league detail page for /leagues/* URLs
[[redirects]]
  from = "/leagues/*"
  to = "/leagues/_.html"
  status = 200

# Serve stores hub at exact /stores path
[[redirects]]
  from = "/stores"
  to = "/stores.html"
  status = 200

# Serve pre-rendered store detail page for /stores/* URLs
[[redirects]]
  from = "/stores/*"
  to = "/stores/_.html"
  status = 200

# Serve pre-rendered inbox page for all /inbox/* URLs
[[redirects]]
  from = "/inbox/*"
  to = "/inbox/_.html"
  status = 200

# SPA fallback for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Cache headers for performance at scale ──

# Hashed JS/CSS bundles are immutable — cache for 1 year
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — 1 day cache with 7-day stale fallback
[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# HTML — always revalidate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Bookmarklet: no cache during development, bump to max-age=3600 when stable
[[headers]]
  for = "/bookmarklet.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── Security headers (all pages) ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://*.firebaseio.com https://*.googleapis.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.googleapis.com https://*.googleusercontent.com https://cdn.fabtcg.com https://i.ytimg.com https://d2wlb52bya4y8z.cloudfront.net https://dgmi4fxzalveh.cloudfront.net https://cdn.discordapp.com; font-src 'self' data:; connect-src 'self' https://*.googleapis.com https://*.googleusercontent.com https://*.firebaseio.com https://*.firebasestorage.app https://*.cloudfunctions.net wss://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; frame-src https://accounts.google.com https://*.firebaseapp.com https://www.youtube.com; object-src 'none'; base-uri 'self'"
